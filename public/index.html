<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>node-collab</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0d10;
        --panel: #14181d;
        --muted: #6b7480;
        --accent: #6cb2ff;
        --you: #f0a96b;
        --them: #6cb2ff;
        --text: #e6ebf2;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 14px/1.5 ui-monospace, Menlo, Consolas, monospace;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }
      header {
        padding: 0.75rem 1rem;
        background: var(--panel);
        border-bottom: 1px solid #232830;
        display: flex;
        gap: 1rem;
        align-items: center;
        flex-wrap: wrap;
      }
      header b { color: var(--text); }
      header span { color: var(--muted); }
      #board {
        position: relative;
        overflow: hidden;
        background:
          repeating-linear-gradient(0deg, transparent 0 39px, #1a1f26 39px 40px),
          repeating-linear-gradient(90deg, transparent 0 39px, #1a1f26 39px 40px);
      }
      .cursor {
        position: absolute;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        pointer-events: none;
        transition: transform 80ms linear;
        background: var(--them);
        box-shadow: 0 0 0 2px rgba(108, 178, 255, 0.25);
      }
      .cursor.me { background: var(--you); box-shadow: 0 0 0 2px rgba(240, 169, 107, 0.25); }
      .cursor::after {
        content: attr(data-name);
        position: absolute;
        top: 14px;
        left: 14px;
        font-size: 11px;
        white-space: nowrap;
        background: var(--panel);
        padding: 1px 6px;
        border-radius: 4px;
      }
      footer {
        background: var(--panel);
        border-top: 1px solid #232830;
        padding: 0.5rem 1rem;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 0.5rem;
      }
      #log {
        max-height: 120px;
        overflow-y: auto;
        font-size: 12px;
        margin-bottom: 0.5rem;
        grid-column: 1 / -1;
      }
      #log .line { color: var(--muted); }
      #log .line b { color: var(--text); }
      input {
        font: inherit;
        background: var(--bg);
        color: var(--text);
        border: 1px solid #232830;
        border-radius: 6px;
        padding: 0.4rem 0.6rem;
      }
      button {
        font: inherit;
        background: var(--accent);
        color: #000;
        border: none;
        border-radius: 6px;
        padding: 0 1rem;
        cursor: pointer;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <header>
      <b>node-collab</b>
      <span>room: <b id="room-label">—</b></span>
      <span>instance: <b id="instance-label">—</b></span>
      <span>presence: <b id="presence-label">0</b></span>
      <span style="margin-left:auto" id="status">connecting…</span>
    </header>
    <div id="board"></div>
    <footer>
      <div id="log"></div>
      <input id="msg" placeholder="say something…" autocomplete="off" />
      <button id="send">Send</button>
    </footer>
    <script type="module">
      // esm.sh wraps the npm package as a real ESM module with a named `io` export.
      // The official cdn.socket.io ESM build doesn't always expose `io` as a named
      // export and fails silently when imported this way.
      let io;
      try {
        ({ io } = await import('https://esm.sh/socket.io-client@4.8.1'));
      } catch (err) {
        document.getElementById('status').textContent = 'failed to load socket.io client';
        console.error('socket.io import failed:', err);
        throw err;
      }

      const params = new URLSearchParams(location.search);
      const room = params.get('room') ?? 'lobby';
      const name = params.get('name') ?? `user-${Math.random().toString(36).slice(2, 6)}`;
      document.getElementById('room-label').textContent = room;

      const status = document.getElementById('status');
      let token;
      try {
        const tokenRes = await fetch(
          `/dev/token?sub=${encodeURIComponent(name)}&name=${encodeURIComponent(name)}`,
        );
        if (!tokenRes.ok) {
          status.textContent = `auth disabled (HTTP ${tokenRes.status}) — set DEMO_MODE=true on the server`;
          throw new Error(`token endpoint returned ${tokenRes.status}`);
        }
        token = (await tokenRes.json()).token;
      } catch (err) {
        if (status.textContent === 'connecting…') {
          status.textContent = 'auth failed — check server DEMO_MODE setting';
        }
        console.error('token fetch failed:', err);
        throw err;
      }

      const health = await fetch('/healthz').then((r) => r.json()).catch(() => ({}));
      document.getElementById('instance-label').textContent = health.instance ?? '?';

      const socket = io({ auth: { token } });
      const board = document.getElementById('board');
      const log = document.getElementById('log');
      const presenceLabel = document.getElementById('presence-label');
      const cursors = new Map();
      let myId = name;

      socket.on('connect', () => {
        status.textContent = 'connected';
        socket.emit('room.join', { room });
      });
      socket.on('disconnect', () => { status.textContent = 'disconnected'; });
      socket.on('connect_error', (err) => { status.textContent = `error: ${err.message}`; });

      socket.on('presence', (data) => {
        if (data.room !== room) return;
        presenceLabel.textContent = String(data.present.length);
        const ids = new Set(data.present.map((p) => p.userId));
        for (const [id, el] of cursors) {
          if (!ids.has(id)) { el.remove(); cursors.delete(id); }
        }
      });

      socket.on('chat', (data) => {
        if (data.room !== room) return;
        const line = document.createElement('div');
        line.className = 'line';
        const who = document.createElement('b');
        who.textContent = data.name ?? data.userId;
        line.append(who, document.createTextNode(': ' + data.text));
        log.appendChild(line);
        log.scrollTop = log.scrollHeight;
      });

      socket.on('cursor', (data) => {
        if (data.room !== room || data.userId === myId) return;
        let el = cursors.get(data.userId);
        if (!el) {
          el = document.createElement('div');
          el.className = 'cursor';
          el.dataset.name = data.userId;
          board.appendChild(el);
          cursors.set(data.userId, el);
        }
        el.style.transform = `translate(${data.x}px, ${data.y}px)`;
      });

      board.addEventListener('mousemove', (e) => {
        const rect = board.getBoundingClientRect();
        socket.emit('cursor', { room, x: e.clientX - rect.left, y: e.clientY - rect.top });
      });

      const msg = document.getElementById('msg');
      const send = document.getElementById('send');
      function sendChat() {
        const text = msg.value.trim();
        if (!text) return;
        socket.emit('chat', { room, text });
        msg.value = '';
      }
      send.addEventListener('click', sendChat);
      msg.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendChat(); });
    </script>
  </body>
</html>
