<figure class="diagram" aria-label="node-collab architecture diagram">
  <header class="diagram__head">
    <span class="diagram__tag">ARCHITECTURE.svg</span>
    <span class="diagram__meta">2 replicas · redis pub/sub · jwt handshake</span>
  </header>

  <div class="diagram__frame">
    <svg
      viewBox="0 0 760 360"
      xmlns="http://www.w3.org/2000/svg"
      role="img"
      class="diagram__svg"
      preserveAspectRatio="xMidYMid meet"
    >
      <!-- ========== defs: arrowheads + filters ========== -->
      <defs>
        <marker
          id="arrow-warm"
          viewBox="0 0 8 8"
          refX="7"
          refY="4"
          markerWidth="6"
          markerHeight="6"
          orient="auto-start-reverse"
        >
          <path d="M0,0 L8,4 L0,8 z" class="diagram__arrow diagram__arrow--warm" />
        </marker>
        <marker
          id="arrow-cool"
          viewBox="0 0 8 8"
          refX="7"
          refY="4"
          markerWidth="6"
          markerHeight="6"
          orient="auto-start-reverse"
        >
          <path d="M0,0 L8,4 L0,8 z" class="diagram__arrow diagram__arrow--cool" />
        </marker>

        <!-- subtle glow used on the redis hub -->
        <filter id="diagram-glow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="2.4" result="blur" />
          <feMerge>
            <feMergeNode in="blur" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>

        <!-- 8x8 grid pattern, rendered behind everything -->
        <pattern id="grid8" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M 20 0 L 0 0 0 20" fill="none" class="diagram__grid-line" />
        </pattern>
      </defs>

      <!-- ========== background grid ========== -->
      <rect width="760" height="360" fill="url(#grid8)" opacity="0.5" />

      <!-- ========== flow lines (rendered first so boxes sit on top) ========== -->
      <!-- client A → instance A : warm (user data) -->
      <path
        d="M 130 100 L 250 100"
        class="diagram__line diagram__line--warm diagram__line--flow"
      />
      <!-- client B → instance B : warm -->
      <path
        d="M 130 260 L 250 260"
        class="diagram__line diagram__line--warm diagram__line--flow"
      />

      <!-- instance A ↔ redis : cool (pub/sub fanout) -->
      <path
        d="M 460 100 C 540 100, 540 160, 600 175"
        class="diagram__line diagram__line--cool diagram__line--flow"
      />
      <!-- instance B ↔ redis : cool -->
      <path
        d="M 460 260 C 540 260, 540 200, 600 195"
        class="diagram__line diagram__line--cool diagram__line--flow"
      />

      <!-- arrowhead overlays at each end so we keep flow direction obvious -->
      <line
        x1="130" y1="100" x2="248" y2="100"
        class="diagram__arrowline diagram__arrowline--warm"
        marker-end="url(#arrow-warm)"
      />
      <line
        x1="130" y1="260" x2="248" y2="260"
        class="diagram__arrowline diagram__arrowline--warm"
        marker-end="url(#arrow-warm)"
      />

      <!-- ========== client A ========== -->
      <g transform="translate(40 76)">
        <rect width="90" height="48" class="diagram__node" rx="2" />
        <text x="12" y="19" class="diagram__node-eyebrow">▸ 01 / browser</text>
        <text x="12" y="36" class="diagram__node-title">client A</text>
      </g>

      <!-- ========== client B ========== -->
      <g transform="translate(40 236)">
        <rect width="90" height="48" class="diagram__node" rx="2" />
        <text x="12" y="19" class="diagram__node-eyebrow">▸ 02 / browser</text>
        <text x="12" y="36" class="diagram__node-title">client B</text>
      </g>

      <!-- ========== instance A ========== -->
      <g transform="translate(250 64)">
        <rect width="210" height="72" class="diagram__node diagram__node--accent" rx="2" />
        <text x="14" y="20" class="diagram__node-eyebrow">▸ a / replica</text>
        <text x="14" y="40" class="diagram__node-title">instance · A</text>
        <text x="14" y="58" class="diagram__node-sub">Express + Socket.IO + handlers</text>

        <!-- corner registration mark -->
        <path d="M 0 0 L 10 0 M 0 0 L 0 10" class="diagram__corner" />
        <path
          d="M 210 72 L 200 72 M 210 72 L 210 62"
          class="diagram__corner"
        />
      </g>

      <!-- ========== instance B ========== -->
      <g transform="translate(250 224)">
        <rect width="210" height="72" class="diagram__node diagram__node--accent" rx="2" />
        <text x="14" y="20" class="diagram__node-eyebrow">▸ b / replica</text>
        <text x="14" y="40" class="diagram__node-title">instance · B</text>
        <text x="14" y="58" class="diagram__node-sub">Express + Socket.IO + handlers</text>

        <path d="M 0 0 L 10 0 M 0 0 L 0 10" class="diagram__corner" />
        <path d="M 210 72 L 200 72 M 210 72 L 210 62" class="diagram__corner" />
      </g>

      <!-- ========== redis hub ========== -->
      <g transform="translate(596 140)" filter="url(#diagram-glow)">
        <rect
          width="120"
          height="80"
          rx="3"
          class="diagram__node diagram__node--hub"
        />
        <!-- cylinder hint -->
        <ellipse cx="60" cy="6" rx="56" ry="4" class="diagram__node-cyl" />
        <text x="60" y="36" text-anchor="middle" class="diagram__node-eyebrow">
          ▸ pub/sub bus
        </text>
        <text x="60" y="56" text-anchor="middle" class="diagram__node-title">redis</text>
        <text x="60" y="71" text-anchor="middle" class="diagram__node-sub">presence · ttl</text>
      </g>

      <!-- ========== labels along the flow lines ========== -->
      <text x="190" y="92" class="diagram__edge-label">cursor · chat</text>
      <text x="190" y="252" class="diagram__edge-label">cursor · chat</text>
      <text x="510" y="118" class="diagram__edge-label diagram__edge-label--cool">
        fanout
      </text>
      <text x="510" y="248" class="diagram__edge-label diagram__edge-label--cool">
        fanout
      </text>

      <!-- ========== axis ticks ========== -->
      <g class="diagram__ticks">
        <text x="14" y="22">000</text>
        <text x="14" y="184">180</text>
        <text x="14" y="346">360</text>
      </g>
    </svg>
  </div>

  <footer class="diagram__legend">
    <span class="diagram__legend-item">
      <span class="diagram__legend-swatch diagram__legend-swatch--warm"></span>
      user data · websocket
    </span>
    <span class="diagram__legend-item">
      <span class="diagram__legend-swatch diagram__legend-swatch--cool"></span>
      cross-replica fanout · redis pub/sub
    </span>
  </footer>
</figure>
